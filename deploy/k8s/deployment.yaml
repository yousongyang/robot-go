apiVersion: apps/v1
kind: Deployment
metadata:
  name: robot-master
  namespace: robot-master
  labels:
    app: robot-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robot-master
  template:
    metadata:
      labels:
        app: robot-master
    spec:
      containers:
        - name: robot-master
          image: ghcr.io/atframework/robot-master:latest
          args:
            - "-config"
            - "/etc/robot-master/master.yaml"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/agents
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/agents
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/robot-master
              readOnly: true
            - name: report
              mountPath: /data/report
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: robot-master-config
        - name: report
          persistentVolumeClaim:
            claimName: robot-master-report
