apiVersion: v1
kind: Service
metadata:
  name: robot-master
  namespace: robot-master
  labels:
    app: robot-master
spec:
  type: ClusterIP
  selector:
    app: robot-master
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
# 如需集群外访问（例如 Agent 在集群外），可改为 NodePort 或 LoadBalancer:
