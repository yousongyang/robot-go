name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          BIN_NAME="robot-master-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -trimpath -ldflags="-s -w" -o "${BIN_NAME}" ./bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: robot-master-${{ matrix.goos }}-${{ matrix.goarch }}
          path: robot-master-*

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Copy default config
        run: cp bin/master.yaml dist/master.yaml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/robot-master-*
            dist/master.yaml
          generate_release_notes: true
